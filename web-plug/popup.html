<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 350px; padding: 15px; font-family: Arial, sans-serif; }
    h3 { margin-top: 0; font-size: 16px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px;}
    .control-group { margin-bottom: 15px; }
    select, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box; font-size: 14px;}
    button { cursor: pointer; border: none; color: white; font-weight: bold; transition: 0.2s;}
    button:hover { opacity: 0.9; }
    #startBtn { background-color: #2ecc71; }
    #stopBtn { background-color: #e74c3c; }
    #clearBtn { background-color: #7f8c8d; }
    textarea { width: 100%; height: 180px; font-family: Consolas, monospace; font-size: 12px; padding: 8px; box-sizing: border-box; background: #f9f9f9; border: 1px solid #ccc; border-radius: 4px; resize: vertical;}
  </style>
</head>
<body>
  <h3>🎯 自动化宏录制器 Pro</h3>
  
  <div class="control-group">
    <label style="font-size:12px; color:#666;">目标框架：</label>
    <select id="frameworkSelect">
      <option value="playwright">Playwright (Python)</option>
      <option value="drissionpage">DrissionPage</option>
      <option value="selenium">Selenium</option>
    </select>
  </div>

  <button id="startBtn">▶ 开始录制 (将记录当前网址)</button>
  <button id="stopBtn" style="display: none;">⏹ 停止录制</button>
  
  <textarea id="codeOutput" placeholder="操作网页，代码将在此实时生成..."></textarea>
  <button id="clearBtn">清空代码</button>

  <script src="popup.js"></script>
</body>
</html>
